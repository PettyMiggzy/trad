<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monad Bump Bot</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>King Petty Trender</h1>
        <p class="muted">Configure, manage wallets, and run EVM or Solana buy/sell cycles.</p>
      </section>

      <section class="panel">
        <h2>Config</h2>
        <form id="config-form" class="grid">
          <label>
            Chain
            <select name="CHAIN">
              <option value="EVM">EVM</option>
              <option value="SOLANA">SOLANA</option>
            </select>
          </label>
          <label>RPC URL <input name="MONAD_RPC" placeholder="https://..." /></label>
          <label>Token Address <input name="TOKEN_ADDRESS" placeholder="0x..." /></label>
          <label>Bump Amount (MON) <input name="BUMP_AMOUNT_MON" placeholder="0.01" /></label>
          <label>Solana RPC <input name="SOLANA_RPC" placeholder="https://..." /></label>
          <label>Solana Token Mint <input name="SOLANA_TOKEN_MINT" placeholder="Token mint address" /></label>
          <label>Solana Input Mint <input name="SOLANA_INPUT_MINT" placeholder="Default: wrapped SOL mint" /></label>
          <label>Bump Amount (SOL) <input name="BUMP_AMOUNT_SOL" placeholder="0.01" /></label>
          <label>Buy Slippage (bps) <input name="BUY_SLIPPAGE_BPS" placeholder="300 = 3%" /></label>
          <label>Interval (ms) <input name="INTERVAL_MS" placeholder="60000" /></label>
          <label>Fee Percent <input name="FEE_PERCENT" placeholder="10" /></label>
          <label>Fee Address <input name="FEE_ADDRESS" placeholder="0x..." /></label>
          <label>Fee Payer Key <input name="FEE_PAYER_KEY" placeholder="0x..." /></label>
          <label>Max Buys Per Cycle <input name="MAX_BUYS_PER_CYCLE" placeholder="10" /></label>
          <label>Lens Address <input name="LENS_ADDRESS" placeholder="optional override" /></label>
          <label>Router Address <input name="ROUTER_ADDRESS" placeholder="optional fallback" /></label>
          <label>
            Trade Mode
            <select name="TRADE_MODE">
              <option value="BUY_ONLY">BUY_ONLY</option>
              <option value="BUY_THEN_SELL">BUY_THEN_SELL</option>
            </select>
          </label>
          <label>Proceeds Address <input name="PROCEEDS_ADDRESS" placeholder="your wallet or claim contract" /></label>
          <label>Sell Slippage (bps) <input name="SELL_SLIPPAGE_BPS" placeholder="300 = 3%" /></label>
          <label>Sell Delay (ms) <input name="SELL_DELAY_MS" placeholder="1200" /></label>
          <label>Gas Reserve (MON) <input name="GAS_RESERVE_MON" placeholder="0.002" /></label>
          <label>Gas Reserve (SOL) <input name="GAS_RESERVE_SOL" placeholder="0.002" /></label>
          <label>Jupiter API URL <input name="JUPITER_BASE_URL" placeholder="https://quote-api.jup.ag/v6" /></label>
          <button type="submit">Save Config</button>
        </form>
      </section>

      <section class="panel">
        <h2>Wallets</h2>
        <form id="wallet-form" class="wallet-form">
          <input id="wallet-key" placeholder="EVM: 0x... | Solana: base58 or [byte-array]" />
          <button type="submit">Add Wallet</button>
        </form>
        <ul id="wallet-list"></ul>
      </section>

      <section class="panel controls">
        <h2>Bot Control</h2>
        <div class="buttons">
          <button id="run-once" type="button">Run Once</button>
          <button id="start" type="button">Start Scheduler</button>
          <button id="stop" type="button">Stop Scheduler</button>
          <button id="refresh" type="button">Refresh</button>
        </div>
        <pre id="status"></pre>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
